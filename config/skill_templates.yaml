skills:
- id: transfer
  display_name: 拿着物体移动
  template: '[subject] transfer [manipulated_object] from [source_anchor] to [destination_anchor]'
  ui_template: '[subject] 拿着 [manipulated_object] 从 [source_anchor] 移动到 [destination_anchor]'
  required_slots:
  - subject
  - manipulated_object
  - source_anchor
  - destination_anchor
  enum_constraints:
    source_anchor:
    - left
    - right
    - up
    - down
    - front
    - back
    - center
    - near
    - far
    - same_position
    - unknown
    destination_anchor:
    - left
    - right
    - up
    - down
    - front
    - back
    - center
    - near
    - far
    - same_position
    - unknown
  end_frame_definition: 物体停止被转移的第一帧
  meaning: 物体已被稳定控制后移动到另一位置；只有明显空间移动才标注。
  example: 右夹爪将杯子从桌面左侧移动到桌面右侧。
  annotation_note: 不包含抓起和释放；如果包含释放，应拆成 Transfer + Place。
  allowed_phase_actions:
  - carry
  - position
  - navigate_motion
- id: pick
  display_name: 抓起
  template: '[subject] pick up [manipulated_object] from [source_anchor], grasp anchor
    [grasp_anchor], grasp method [grasp_method]'
  ui_template: '[subject] 从 [source_anchor] 抓起 [manipulated_object]，抓取部位 [grasp_anchor]，抓取方式
    [grasp_method]'
  required_slots:
  - subject
  - manipulated_object
  - source_anchor
  - grasp_anchor
  - grasp_method
  enum_constraints:
    source_anchor:
    - left
    - right
    - up
    - down
    - front
    - back
    - center
    - near
    - far
    - same_position
    - unknown
    grasp_method:
    - pinch
    - clamp
    - hook
    - support
    - wrap
    - cage
    - suction
    - magnetic
    - unknown
    grasp_anchor:
    - main_body
    - top
    - bottom
    - front
    - back
    - left_side
    - right_side
    - center
    - edge
    - corner
    - handle
    - opening
    - tip
    - tail
    - surface
    - unknown
  end_frame_definition: 夹取稳定将要移动的第一帧
  meaning: 接近并抓起物体。
  example: 左夹爪从桌面右侧区域抓取书本，抓取部位为书本主体，抓取方式为夹取。
  annotation_note: manipulated_object 写完整物体；grasp_anchor 写抓取部位。
  allowed_phase_actions:
  - approach
  - align
  - grasp
  - secure
  - lift
- id: place
  display_name: 放置
  template: '[subject] place [manipulated_object] [placement_relation] [destination_anchor]
    and release it'
  ui_template: '[subject] 将 [manipulated_object] 以 [placement_relation] 的关系放到 [destination_anchor]
    并释放'
  required_slots:
  - subject
  - manipulated_object
  - placement_relation
  - destination_anchor
  enum_constraints:
    destination_anchor:
    - left
    - right
    - up
    - down
    - front
    - back
    - center
    - near
    - far
    - same_position
    - unknown
    placement_relation:
    - 'on'
    - in
    - into
    - under
    - beside
    - near
    - against
    - hang_on
    - back_to
  end_frame_definition: 夹爪与物体接触关系消失的第一帧
  meaning: 平稳放下物体，不是扔。
  example: 右夹爪将杯子放到桌面右侧区域并释放。
  annotation_note: placement_relation 使用固定枚举；释放动作属于 Place。
  allowed_phase_actions:
  - position
  - lower
  - release
  - retreat
- id: press
  display_name: 按压
  template: '[subject] press [press_anchor] of [interaction_target] at [position_anchor]
    and affect [changed_object]'
  ui_template: '[subject] 在 [position_anchor] 按压 [interaction_target] 的 [press_anchor]，作用于
    [changed_object]'
  required_slots:
  - subject
  - press_anchor
  - interaction_target
  - position_anchor
  - changed_object
  enum_constraints:
    position_anchor:
    - main_body
    - top
    - bottom
    - front
    - back
    - left_side
    - right_side
    - center
    - edge
    - corner
    - handle
    - opening
    - tip
    - tail
    - surface
    - unknown
    press_anchor:
    - main_body
    - top
    - bottom
    - front
    - back
    - left_side
    - right_side
    - center
    - edge
    - corner
    - handle
    - opening
    - tip
    - tail
    - surface
    - unknown
  end_frame_definition: 目标被稳定按下之后将要释放或状态变化生效的第一帧
  meaning: 按按钮、开关、可按压部件。
  example: 右夹爪在面板右侧按压按钮顶部。
  annotation_note: press_anchor 是被按压部位；interaction_target 是整体对象。
  allowed_phase_actions:
  - approach
  - align
  - press_motion
  - retreat
- id: push
  display_name: 推动
  template: '[subject] push [interaction_target] at [push_anchor] from [source_anchor]
    to/toward [destination_anchor] and affect [changed_object]'
  ui_template: '[subject] 在 [push_anchor] 推动 [interaction_target]，从 [source_anchor]
    到/朝向 [destination_anchor]，作用于 [changed_object]'
  required_slots:
  - subject
  - interaction_target
  - push_anchor
  - source_anchor
  - destination_anchor
  - changed_object
  enum_constraints:
    source_anchor:
    - left
    - right
    - up
    - down
    - front
    - back
    - center
    - near
    - far
    - same_position
    - unknown
    destination_anchor:
    - left
    - right
    - up
    - down
    - front
    - back
    - center
    - near
    - far
    - same_position
    - unknown
    push_anchor:
    - main_body
    - top
    - bottom
    - front
    - back
    - left_side
    - right_side
    - center
    - edge
    - corner
    - handle
    - opening
    - tip
    - tail
    - surface
    - unknown
  end_frame_definition: 施加推力结束的第一帧
  meaning: 推动物体、把手、门、抽屉等。
  example: 右夹爪推动抽屉把手，使抽屉向内关闭。
  annotation_note: 不要求抓住；强调受力方向上的位移。
  allowed_phase_actions:
  - approach
  - align
  - push_motion
  - retreat
- id: pull
  display_name: 拉动
  template: '[subject] pull [interaction_target] at [pull_anchor] from [source_anchor]
    to/toward [destination_anchor] and affect [changed_object]'
  ui_template: '[subject] 在 [pull_anchor] 拉动 [interaction_target]，从 [source_anchor]
    到/朝向 [destination_anchor]，作用于 [changed_object]'
  required_slots:
  - subject
  - interaction_target
  - pull_anchor
  - source_anchor
  - destination_anchor
  - changed_object
  enum_constraints:
    source_anchor:
    - left
    - right
    - up
    - down
    - front
    - back
    - center
    - near
    - far
    - same_position
    - unknown
    destination_anchor:
    - left
    - right
    - up
    - down
    - front
    - back
    - center
    - near
    - far
    - same_position
    - unknown
    pull_anchor:
    - main_body
    - top
    - bottom
    - front
    - back
    - left_side
    - right_side
    - center
    - edge
    - corner
    - handle
    - opening
    - tip
    - tail
    - surface
    - unknown
  end_frame_definition: 拉力结束的第一帧
  meaning: 拉动物体，如抽屉、门、拉链、窗帘。
  example: 右夹爪拉动窗帘边缘，将窗帘从左侧拉到右侧。
  annotation_note: 可包含短暂抓住，但核心是拉动目标。
  allowed_phase_actions:
  - approach
  - align
  - grasp
  - secure
  - pull_motion
  - retreat
- id: twist
  display_name: 旋转
  template: '[subject] twist [interaction_target] at [twist_anchor] [rotation_direction]
    and affect [changed_object]'
  ui_template: '[subject] 在 [twist_anchor] 以 [rotation_direction] 方向旋转 [interaction_target]，作用于
    [changed_object]'
  required_slots:
  - subject
  - interaction_target
  - twist_anchor
  - rotation_direction
  - changed_object
  enum_constraints:
    rotation_direction:
    - clockwise
    - counterclockwise
    twist_anchor:
    - main_body
    - top
    - bottom
    - front
    - back
    - left_side
    - right_side
    - center
    - edge
    - corner
    - handle
    - opening
    - tip
    - tail
    - surface
    - unknown
  end_frame_definition: 目标旋转结束的第一帧
  meaning: 旋转、拧动、转开关、拧盖子。
  example: 右夹爪顺时针拧动瓶盖。
  annotation_note: rotation_direction 固定为 clockwise / counterclockwise。
  allowed_phase_actions:
  - approach
  - align
  - grasp
  - secure
  - rotate_motion
  - retreat
- id: pour
  display_name: 倾倒
  template: '[subject] pour [substance] from [source_container] into [destination_container]
    by manipulating [manipulated_object] and affect [changed_object]'
  ui_template: '[subject] 操作 [manipulated_object]，将 [substance] 从 [source_container]
    倒入 [destination_container]，作用于 [changed_object]'
  required_slots:
  - subject
  - substance
  - source_container
  - destination_container
  - manipulated_object
  - changed_object
  enum_constraints:
    substance:
    - liquid
    - granules
    - powder
    - solid_items
    - mixed_contents
    - unknown
  end_frame_definition: 倾倒结束的第一帧
  meaning: 倾倒液体、颗粒、粉末。
  example: 右夹爪握持水壶，将水从水壶倒入杯子。
  annotation_note: manipulated_object 是被机器人直接控制的容器；substance 是内容物类型。
  allowed_phase_actions:
  - position
  - tilt_motion
  - pour_motion
  - retreat
- id: fold
  display_name: 折叠
  template: '[subject] fold [folded_part_anchor] of [manipulated_object] and affect
    [changed_object]'
  ui_template: '[subject] 折叠 [manipulated_object] 的 [folded_part_anchor]，作用于 [changed_object]'
  required_slots:
  - subject
  - manipulated_object
  - folded_part_anchor
  - changed_object
  enum_constraints:
    folded_part_anchor:
    - main_body
    - top
    - bottom
    - front
    - back
    - left_side
    - right_side
    - center
    - edge
    - corner
    - handle
    - opening
    - tip
    - tail
    - surface
    - unknown
  end_frame_definition: 折叠步骤完成的第一帧
  meaning: 折叠布料、纸张、软物体。
  example: 双手将毛巾的一侧向内折叠。
  annotation_note: 适合布料、纸张、衣物；folded_part_anchor 是被折叠部位。
  allowed_phase_actions:
  - approach
  - align
  - grasp
  - secure
  - fold_motion
  - position
  - release
  - retreat
- id: slide
  display_name: 滑动
  template: '[subject] slide [manipulated_object] on [support_surface] from [source_anchor]
    to [destination_anchor]'
  ui_template: '[subject] 让 [manipulated_object] 在 [support_surface] 上从 [source_anchor]
    滑动到 [destination_anchor]'
  required_slots:
  - subject
  - manipulated_object
  - support_surface
  - source_anchor
  - destination_anchor
  enum_constraints:
    source_anchor:
    - left
    - right
    - up
    - down
    - front
    - back
    - center
    - near
    - far
    - same_position
    - unknown
    destination_anchor:
    - left
    - right
    - up
    - down
    - front
    - back
    - center
    - near
    - far
    - same_position
    - unknown
  end_frame_definition: 物体结束滑行力供给的第一帧
  meaning: 不拿起，沿表面滑动。
  example: 右夹爪将盘子沿桌面从左侧滑到右侧。
  annotation_note: 与 Transfer 区别：物体始终接触支撑面。
  allowed_phase_actions:
  - approach
  - align
  - slide_motion
  - retreat
- id: insert
  display_name: 插入
  template: '[subject] insert [manipulated_object] into [destination_anchor] through
    [insert_anchor] and affect [changed_object]'
  ui_template: '[subject] 将 [manipulated_object] 通过 [insert_anchor] 插入 [destination_anchor]，作用于
    [changed_object]'
  required_slots:
  - subject
  - manipulated_object
  - destination_anchor
  - insert_anchor
  - changed_object
  enum_constraints:
    destination_anchor:
    - left
    - right
    - up
    - down
    - front
    - back
    - center
    - near
    - far
    - same_position
    - unknown
    insert_anchor:
    - main_body
    - top
    - bottom
    - front
    - back
    - left_side
    - right_side
    - center
    - edge
    - corner
    - handle
    - opening
    - tip
    - tail
    - surface
    - unknown
  end_frame_definition: 机器人完成插入稳定的第一帧
  meaning: 插入孔、槽、接口、容器开口。
  example: 右夹爪将积木插入盒子凹槽。
  annotation_note: insert_anchor 是入口/孔/槽；destination_anchor 是插入后的目标位置。
  allowed_phase_actions:
  - position
  - align
  - insert_motion
  - release
  - retreat
- id: shake
  display_name: 摇晃
  template: '[subject] shake [manipulated_object] at [position_anchor] and affect
    [changed_object]'
  ui_template: '[subject] 在 [position_anchor] 摇晃 [manipulated_object]，作用于 [changed_object]'
  required_slots:
  - subject
  - manipulated_object
  - position_anchor
  - changed_object
  enum_constraints:
    position_anchor:
    - main_body
    - top
    - bottom
    - front
    - back
    - left_side
    - right_side
    - center
    - edge
    - corner
    - handle
    - opening
    - tip
    - tail
    - surface
    - unknown
  end_frame_definition: 摇晃结束的第一帧
  meaning: 摇晃物体，使内部物质混合、散开或掉落。
  example: 右夹爪摇晃瓶子，使瓶内液体混合。
  annotation_note: 通常要求物体已被稳定抓住；不包含 Pick。
  allowed_phase_actions:
  - secure
  - shake_motion
- id: strike
